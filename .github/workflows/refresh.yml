name: Refresh URLs and Deploy

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Prepare data files
        run: |
          mkdir -p work
          python3 scripts/fetch_xuexi_urls.py || true

      - name: Refresh YSP URLs
        run: |
          rm -f work/ysp_checkpoint.json
          timeout 600 node scripts/gen_ysp_urls3.js || true

      - name: Refresh xuexi URLs
        run: |
          rm -f work/xuexi_checkpoint.json
          timeout 300 node scripts/gen_xuexi_fast.js || true

      - name: Build Worker
        run: |
          python3 scripts/build_v210_blind.py
          python3 scripts/apply_segment_fix.py
          node --check work/worker_v210_blind.js
          cp work/worker_v210_blind.js work/worker.js

      - name: Deploy to Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        run: |
          python3 scripts/deploy_worker.py

      - name: Verify
        run: |
          sleep 5
          STATUS=$(curl -s "https://iptv345.lishuhang.workers.dev/" | head -1)
          echo "Worker status: $STATUS"

      - name: Commit updated URLs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add work/ysp_m3u8_urls.json work/xuexi_m3u8_authed.json 2>/dev/null || true
          git commit -m "Auto-refresh $(date -u '+%Y-%m-%d %H:%M')" || true
          git push || true
