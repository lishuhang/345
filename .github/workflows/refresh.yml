name: Refresh and Deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps
      - name: Prepare
        run: mkdir -p work && python3 scripts/fetch_xuexi_urls.py || true
      - name: Refresh xuexi URLs
        run: rm -f work/xuexi_checkpoint.json && timeout 300 node scripts/gen_xuexi_fast.js || true
      - name: Refresh YSP URLs
        run: rm -f work/ysp_checkpoint.json && timeout 600 node scripts/gen_ysp_fast.js || true
      - name: Build
        run: |
          python3 scripts/build_v210_blind.py
          python3 scripts/apply_segment_fix.py
          node --check work/worker_v210_blind.js
          cp work/worker_v210_blind.js work/worker.js
      - name: Deploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        run: python3 scripts/deploy_worker.py
      - name: Verify
        run: |
          sleep 5
          curl -s "https://iptv345.lishuhang.workers.dev/" | head -2
