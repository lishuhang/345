name: Refresh YSP URLs

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  refresh-ysp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install Playwright
        run: npm install playwright && npx playwright install chromium --with-deps
      - name: Prepare
        run: mkdir -p work
      - name: Refresh YSP URLs
        run: rm -f work/ysp_checkpoint.json && timeout 600 node scripts/gen_ysp_fast.js || true
      - name: Commit YSP URLs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add work/ysp_m3u8_urls.json 2>/dev/null || true
          git commit -m "ysp refresh $(date -u '+%H:%M')" || true
          git push || true
      - name: Pull latest (include xuexi URLs from other workflow)
        run: git pull origin main || true
      - name: Build & Deploy
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
        run: |
          python3 scripts/build_v210_blind.py
          python3 scripts/apply_segment_fix.py
          node --check work/worker_v210_blind.js
          cp work/worker_v210_blind.js work/worker.js
          python3 scripts/deploy_worker.py
